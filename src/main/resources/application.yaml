management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,mappings
  endpoint:
    health:
      show-details: always
logging:
  level:
    org.springframework.boot.autoconfigure.h2: DEBUG
spring:
  application:
    name: configtracker

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/midoffice

resilience4j:
  retry:
    instances:
      externalService:
        maxAttempts: 3
        waitDuration: 100ms
      alertingService:
        maxAttempts: 2
        waitDuration: 50ms
  circuitbreaker:
    instances:
      externalService:
        failureRateThreshold: 50
        minimumNumberOfCalls: 5
        slidingWindowSize: 10
        waitDurationInOpenState: 5s
        registerHealthIndicator: true
      alertingService:
        failureRateThreshold: 30
        minimumNumberOfCalls: 3
        slidingWindowSize: 5
        waitDurationInOpenState: 10s
        registerHealthIndicator: true